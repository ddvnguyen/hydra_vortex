name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  checks: write
  contents: read

jobs:
  build-test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Restore & build (.NET)
        run: dotnet build Hydra.sln -c Release --nologo -v minimal

      - name: Unit tests — Shared
        run: |
          dotnet test src/Tests.Shared/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=shared.trx" \
            --results-directory TestResults/

      - name: Unit tests — Store
        run: |
          dotnet test src/Tests.Store/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=store.trx" \
            --results-directory TestResults/

      - name: Unit tests — Agent
        run: |
          dotnet test src/Tests.Agent/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=agent.trx" \
            --results-directory TestResults/

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: TestResults/*.trx
          retention-days: 30

  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-integration')

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: dotnet build Hydra.sln -c Release --nologo -v minimal

      - name: Integration tests
        run: |
          dotnet test src/Tests.Integration/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory TestResults/
        env:
          HYDRA_STORE_URL: http://localhost:9500
          HYDRA_AGENT_RTX_URL: http://localhost:9601
          HYDRA_AGENT_P100_URL: http://localhost:9602

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Tests
          path: TestResults/integration.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ github.run_number }}
          path: TestResults/integration.trx
          retention-days: 30

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (podman-compose)
        id: deploy
        run: |
          REV=$(git rev-parse --short HEAD)
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "rev=$REV" >> "$GITHUB_OUTPUT"

          cd infra
          podman-compose build 2>&1 | tee /tmp/hydra-build.log | tail -5
          podman-compose up -d 2>&1 | tee /tmp/hydra-up.log | tail -5

      - name: Record deploy log
        run: |
          REV="${{ steps.deploy.outputs.rev }}"
          VERSION="${{ steps.deploy.outputs.version }}"
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $VERSION ($REV) deployed via CI by ${{ github.actor }}" >> deploy.log

      - name: Write deploy summary
        if: always()
        run: |
          VERSION="${{ steps.deploy.outputs.version }}"
          REV="${{ steps.deploy.outputs.rev }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_LOG=$(tail -10 /tmp/hydra-build.log 2>/dev/null || echo "(no output)")
          UP_LOG=$(tail -5 /tmp/hydra-up.log 2>/dev/null || echo "(no output)")

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## Deploy Summary

          | Field   | Value |
          |---------|-------|
          | Version | \`$VERSION\` |
          | Commit  | \`$REV\` |
          | Branch  | \`${{ github.ref_name }}\` |
          | By      | ${{ github.actor }} |
          | Time    | $TIMESTAMP |

          ### Build log
          \`\`\`
          $BUILD_LOG
          \`\`\`

          ### Services
          \`\`\`
          $UP_LOG
          \`\`\`
          SUMMARY

      - name: Upload deploy log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-log-${{ github.run_number }}
          path: deploy.log
          retention-days: 90

  e2e-mocked:
    name: E2E Tests (mocked)
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install -e ".[dev]" --quiet

      - name: Run mocked E2E tests
        run: |
          pytest tests/e2e/test_m1_e2e.py tests/e2e/test_m2_e2e.py -v \
            --junit-xml=TestResults/e2e-mocked.xml

      - name: Publish E2E mocked results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests (mocked)
          path: TestResults/e2e-mocked.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload E2E mocked artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-mocked-results-${{ github.run_number }}
          path: TestResults/e2e-mocked.xml
          retention-days: 30

  e2e-full:
    name: E2E Tests (full stack)
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 60
    # Requires all 6 services running. Only triggered on main or with label.
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-e2e')

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Python deps
        run: pip install -e ".[all]" --quiet

      - name: Check services are healthy
        run: |
          echo "Checking Coordinator health..."
          curl -sf http://localhost:9000/health | python3 -m json.tool
          STATUS=$(curl -sf http://localhost:9000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
            echo "Coordinator not healthy (status=$STATUS). Are all 6 services running?"
            exit 1
          fi
          echo "Services OK (status=$STATUS)"

      - name: Run full-stack E2E tests
        run: |
          pytest tests/e2e/ -m e2e -v --timeout=300 \
            --ignore=tests/e2e/test_large_prompt_e2e.py \
            --ignore=tests/e2e/test_stress_e2e.py \
            --junit-xml=TestResults/e2e-full.xml
        env:
          COORD_URL: http://localhost:9000
          RTX_LLAMA_URL: http://localhost:8080
          P100_LLAMA_URL: http://192.168.122.21:8086
          LLAMA_RTX_URL: http://localhost:8080
          LLAMA_P100_URL: http://192.168.122.21:8086
          RTX_AGENT_HOST: "127.0.0.1"
          RTX_AGENT_PORT: "9601"
          P100_AGENT_HOST: "192.168.122.21"
          P100_AGENT_PORT: "9602"
          STORE_HOST: "127.0.0.1"
          STORE_PORT: "9500"

      - name: Publish full-stack E2E results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: E2E Tests (full stack)
          path: TestResults/e2e-full.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload full-stack E2E artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-full-results-${{ github.run_number }}
          path: TestResults/e2e-full.xml
          retention-days: 30
