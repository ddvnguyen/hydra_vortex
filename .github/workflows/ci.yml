name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "llama.cpp*"
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'AGENTS.md'
      - 'CLAUDE.md'
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-system-full:
        description: "Run full-stack system tests (requires all 6 services healthy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy-infra:
        description: "Deploy infra/observability services (Prometheus, Grafana, Loki, Promtail)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy-hydra:
        description: "Deploy Hydra services (Store, Agents, Coordinator)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy-llama:
        description: "Deploy llama-server to RTX + P100"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  checks: write
  contents: read
  issues: write

jobs:
  build-test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 30
    # Never run on a fork's pull request — fork PRs can execute arbitrary code
    # on the self-hosted runner. Only safe origins: push (collaborator-only),
    # workflow_dispatch (collaborator-only), and PRs from within this repo.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Cancel duplicate queued runs
        run: |
          gh run list --workflow CI --branch "${{ github.ref_name }}" \
            --json databaseId,status --jq '.[] | select(.status == "queued") | .databaseId' |
          while read id; do
            [ "$id" != "${{ github.run_id }}" ] && gh run cancel "$id" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Restore & build (.NET)
        run: dotnet build src/Hydra.sln -c Release --nologo -v minimal

      - name: Unit tests — Shared
        run: |
          dotnet test src/core/Tests.Shared/ -c Release --no-build --nologo -v normal \
            --settings src/Hydra.runsettings \
            --logger "trx;LogFileName=shared.trx" \
            --results-directory TestResults/

      - name: Unit tests — Core
        run: |
          dotnet test src/core/Tests.Core/ -c Release --no-build --nologo -v normal \
            --settings src/Hydra.runsettings \
            --filter "FullyQualifiedName!~StoreMetadataTests&FullyQualifiedName!~WriteBehindServiceTests" \
            --logger "trx;LogFileName=core.trx" \
            --results-directory TestResults/


      - name: Unit tests — Coordinator (Python)
        run: |
          python3 -m pytest tests/coordinator/test_router.py -v \
            --junit-xml=TestResults/coordinator.xml

      - name: Publish .NET test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Unit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false


      - name: Publish Python test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python Unit Tests
          path: TestResults/coordinator.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: |
            TestResults/*.trx
            TestResults/coordinator.xml
          retention-days: 30

      - name: Clean .NET download cache
        if: always()
        run: dotnet nuget locals http-cache --clear --force-english-output

      - name: Create issue on build/unit-test failure
        if: failure()
        run: |
          TITLE="CI: build-test failure on ${{ github.ref_name }}"
          EXISTING=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --body "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Actor:** ${{ github.actor }}

          Build or unit tests failed. See run for details and test artifacts." \
              --label "ci-failure,auto-created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-infra:
    name: Deploy Infra
    runs-on: self-hosted
    timeout-minutes: 10
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-infra == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Install Quadlet files
        run: |
          mkdir -p ~/.config/containers/systemd/
          cp $GITHUB_WORKSPACE/infra/quadlets/infra-*.container ~/.config/containers/systemd/
          cp $GITHUB_WORKSPACE/infra/quadlets/infra-host.pod ~/.config/containers/systemd/
          cp $GITHUB_WORKSPACE/infra/quadlets/*.volume ~/.config/containers/systemd/
          cp $GITHUB_WORKSPACE/infra/quadlets/hydra-coordinator.env ~/.config/containers/systemd/ 2>/dev/null || true

      - name: Deploy infra services
        run: |
          systemctl --user daemon-reload
          systemctl --user stop infra-host-pod.service 2>/dev/null || true
          sleep 1
          for s in infra-node-exporter infra-nvidia-exporter infra-loki infra-promtail infra-prometheus infra-grafana infra-pgadmin; do
            systemctl --user start "$s.service" || true
          done

      - name: Verify infra services
        run: |
          sleep 10
          for url in "http://localhost:9091" "http://localhost:3000" "http://localhost:3100" "http://localhost:8888"; do
            if curl -sf "$url" --connect-timeout 5 &>/dev/null; then
              echo "OK: $url"
            else
              echo "WARNING: $url not responding"
            fi
          done

  deploy-hydra:
    name: Deploy Hydra
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-hydra == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          echo "version=$(cat VERSION)" >> "$GITHUB_OUTPUT"
          echo "rev=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Build images
        id: build
        run: |
          set -eo pipefail
          # Hydra core
          podman build --target core -f $GITHUB_WORKSPACE/infra/Dockerfile \
            -t localhost/hydra-core:latest $GITHUB_WORKSPACE \
            2>&1 | tee /tmp/hydra-build-core.log | tail -3
          # Build the CUDA base image used by hydra-head RTX
          podman build -f $GITHUB_WORKSPACE/infra/llama-rtx-node/Dockerfile_26.04_cuda13.2 \
            -t hydra-cuda-base:latest $GITHUB_WORKSPACE/infra/llama-rtx-node \
            2>&1 | tee /tmp/hydra-build-cuda-base.log | tail -3
          # Build hydra-head (Go binary)
          go build -C $GITHUB_WORKSPACE/src/head -o $GITHUB_WORKSPACE/bin/hydra-head . \
            2>&1 | tee /tmp/hydra-build-head.log | tail -3
          # Unit tests for hydra-head Go packages
          go test -C $GITHUB_WORKSPACE/src/head -count=1 ./... \
            2>&1 | tee /tmp/hydra-test-head.log | tail -10
          # Build hydra-head RTX container
          podman build -f $GITHUB_WORKSPACE/infra/hydra-head/Dockerfile.rtx \
            -t localhost/hydra-head:rtx $GITHUB_WORKSPACE \
            2>&1 | tee /tmp/hydra-build-head-rtx.log | tail -3
          echo "Build complete"

      - name: Deploy Hydra Core
        id: deploy-core
        run: |
          set -eo pipefail
          # Stop any running core
          podman stop hydra-core 2>/dev/null || true
          podman rm hydra-core 2>/dev/null || true
          # Start via docker-compose
          cd $GITHUB_WORKSPACE/infra
          podman compose -f docker-compose.hydra.yml up -d
          echo "Hydra core started"

      - name: Deploy Hydra Head RTX
        id: deploy-head-rtx
        run: |
          set -eo pipefail
          bash $GITHUB_WORKSPACE/scripts/deploy-hydra-head.sh rtx
          echo "Hydra head RTX started"

      - name: Verify services healthy
        run: |
          echo "Waiting for services to stabilise..."
          sleep 15
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf http://localhost:9000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null || echo "unreachable")
            echo "Attempt $i: coordinator status=$STATUS"
            if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
              echo "Services OK"
              exit 0
            fi
            sleep 10
          done
          echo "Coordinator did not come up healthy after deploy"
          exit 1

  system-mocked:
    name: System Tests (mocked)
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: Install Python deps
        run: pip install -e ".[dev]" --quiet

      - name: Run mocked system tests
        run: |
          pytest tests/system/test_m1_system.py tests/system/test_m2_system.py -v \
            --junit-xml=TestResults/system-mocked.xml

      - name: Publish system mocked results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: System Mocked Results
          path: TestResults/system-mocked.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload system mocked artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-mocked-results-${{ github.run_number }}
          path: TestResults/system-mocked.xml
          retention-days: 30

  system-full:
    name: System Tests (full stack)
    runs-on: self-hosted
    needs: [build-test, deploy-hydra, deploy-infra]
    timeout-minutes: 60
    # Only runs on explicit workflow_dispatch with run-system-full=true.
    # Full-stack tests require all 6 services healthy (llama RTX, llama P100,
    # Store, Agents, Coordinator, Observability) — never automatic.
    if: |
      always() &&
      needs.build-test.result == 'success' &&
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.run-system-full == 'true'

    steps:
      - uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: Install Python deps
        run: pip install -e ".[all]" --quiet

      - name: Check services are healthy
        run: |
          echo "Checking Coordinator health..."
          curl -sf http://localhost:9000/health | python3 -m json.tool
          STATUS=$(curl -sf http://localhost:9000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
            echo "Coordinator not healthy (status=$STATUS). Are all 6 services running?"
            exit 1
          fi
          echo "Services OK (status=$STATUS)"

      - name: Run full-stack system tests
        run: |
          pytest tests/system/ -m system -v --timeout=300 \
            --ignore=tests/system/test_large_prompt_system.py \
            --ignore=tests/system/test_stress_system.py \
            --junit-xml=TestResults/system-full.xml
        env:
          COORD_URL: http://localhost:9000
          RTX_LLAMA_URL: http://localhost:8080
          P100_LLAMA_URL: http://192.168.122.21:8086
          LLAMA_RTX_URL: http://localhost:8080
          LLAMA_P100_URL: http://192.168.122.21:8086
          RTX_AGENT_HOST: "127.0.0.1"
          RTX_AGENT_PORT: "9601"
          P100_AGENT_HOST: "192.168.122.21"
          P100_AGENT_PORT: "9602"
          STORE_HOST: "127.0.0.1"
          STORE_PORT: "9500"

      - name: Publish full-stack system results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: System Full Stack Results
          path: TestResults/system-full.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload full-stack system artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-full-results-${{ github.run_number }}
          path: TestResults/system-full.xml
          retention-days: 30

      - name: Create issue on system test full-stack failure
        if: failure()
        run: |
          TITLE="CI: System test full-stack failure on ${{ github.ref_name }}"
          EXISTING=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --body "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Actor:** ${{ github.actor }}

          Full-stack system tests failed. Hardware may be involved — check GPU health, KV migration path, and coordinator logs in Grafana." \
              --label "ci-failure,auto-created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-llama:
    name: Deploy hydra-head (manages llama + 3 services)
    runs-on: self-hosted
    timeout-minutes: 10
    if: |
      startsWith(github.ref, 'refs/tags/llama.cpp') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-llama == 'true')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Ensure SSH config for P100
        run: |
          grep -q "Host hydra-p100" ~/.ssh/config 2>/dev/null || cat >> ~/.ssh/config <<'EOF'

          Host hydra-p100
              HostName 192.168.122.21
              User vm1
              IdentityFile ~/.ssh/vm_agent_01
              IdentitiesOnly yes
          EOF

      - name: Deploy hydra-head to RTX (container)
        run: |
          bash $GITHUB_WORKSPACE/scripts/deploy-hydra-head.sh rtx
          sleep 8
          curl -sf http://localhost:9700/status >/dev/null && echo "hydra-head-rtx OK" || echo "WARNING: hydra-head-rtx not responding"

      - name: Deploy hydra-head to P100 (VM systemd)
        run: |
          bash $GITHUB_WORKSPACE/scripts/deploy-hydra-head.sh p100
          sleep 8
          curl -sf http://192.168.122.21:9700/status >/dev/null && echo "hydra-head-p100 OK" || echo "WARNING: hydra-head-p100 not responding"

      - name: Write deploy summary
        if: always()
        run: |
          TAG="${{ github.ref_name }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## hydra-head Deploy

          | Field | Value |
          |-------|-------|
          | Tag   | \`$TAG\` |
          | By    | ${{ github.actor }} |
          | Time  | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          **RTX**: hydra-head container on :9700
          **P100**: hydra-head systemd service on :9700
          SUMMARY
