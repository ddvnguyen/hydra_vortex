name: CI

on:
  push:
    branches: ["**"]
    tags:
      - "llama.cpp*"
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      run-system-full:
        description: "Run full-stack system tests (requires all 6 services healthy)"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
      deploy-llama:
        description: "Deploy llama-server to RTX + P100"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  checks: write
  contents: read
  issues: write

jobs:
  build-test:
    name: Build & Test
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Cancel duplicate queued runs
        run: |
          gh run list --workflow CI --branch "${{ github.ref_name }}" \
            --json databaseId,status --jq '.[] | select(.status == "queued") | .databaseId' |
          while read id; do
            [ "$id" != "${{ github.run_id }}" ] && gh run cancel "$id" 2>/dev/null || true
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/checkout@v4

      - name: Restore & build (.NET)
        run: dotnet build Hydra.sln -c Release --nologo -v minimal

      - name: Unit tests — Shared
        run: |
          dotnet test src/Tests.Shared/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=shared.trx" \
            --results-directory TestResults/

      - name: Unit tests — Store
        run: |
          dotnet test src/Tests.Store/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=store.trx" \
            --results-directory TestResults/

      - name: Unit tests — Agent
        run: |
          dotnet test src/Tests.Agent/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=agent.trx" \
            --results-directory TestResults/


      - name: Unit tests — Coordinator (Python)
        run: |
          python3 -m pytest src/coordinator/tests/test_router.py -v \
            --junit-xml=TestResults/coordinator.xml

      - name: Publish .NET test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: .NET Unit Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false


      - name: Publish Python test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Python Unit Tests
          path: TestResults/coordinator.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: |
            TestResults/*.trx
            TestResults/coordinator.xml
          retention-days: 30

      - name: Clean .NET download cache
        if: always()
        run: dotnet nuget locals http-cache --clear --force-english-output

      - name: Create issue on build/unit-test failure
        if: failure()
        run: |
          TITLE="CI: build-test failure on ${{ github.ref_name }}"
          EXISTING=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --body "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Actor:** ${{ github.actor }}

          Build or unit tests failed. See run for details and test artifacts." \
              --label "ci-failure,auto-created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration:
    name: Integration Tests
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 15
    if: github.ref == 'refs/heads/main' || contains(github.event.pull_request.labels.*.name, 'run-integration')

    steps:
      - uses: actions/checkout@v4

      - name: Shutdown lingering build servers
        run: dotnet build-server shutdown

      - name: Build
        run: dotnet build Hydra.sln -c Release --nologo -v minimal

      - name: Integration tests
        run: |
          dotnet test src/Tests.Integration/ -c Release --no-build --nologo -v normal \
            --logger "trx;LogFileName=integration.trx" \
            --results-directory TestResults/
        env:
          HYDRA_STORE_URL: http://localhost:9500
          HYDRA_AGENT_RTX_URL: http://localhost:9601
          HYDRA_AGENT_P100_URL: http://localhost:9602

      - name: Publish integration test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Integration Test Results
          path: TestResults/integration.trx
          reporter: dotnet-trx
          fail-on-error: false
          fail-on-empty: false

      - name: Upload integration test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results-${{ github.run_number }}
          path: TestResults/integration.trx
          retention-days: 30

      - name: Create issue on integration failure
        if: failure()
        run: |
          TITLE="CI: integration failure on ${{ github.ref_name }}"
          EXISTING=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --body "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Actor:** ${{ github.actor }}

          Integration tests failed. Services may be degraded — check Store/Agent/Coordinator health." \
              --label "ci-failure,auto-created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy (podman-compose)
        id: deploy
        run: |
          REV=$(git rev-parse --short HEAD)
          VERSION=$(cat VERSION)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "rev=$REV" >> "$GITHUB_OUTPUT"

          cd infra
          # Full down first — up -d on running containers in rootless podman
          # corrupts overlay mounts and rootlessport forwarding (ports drop off
          # ss, podman exec fails with "transport endpoint is not connected").
          podman-compose down 2>&1 | tee /tmp/hydra-down.log | tail -3
          podman-compose build 2>&1 | tee /tmp/hydra-build.log | tail -5
          podman-compose up -d 2>&1 | tee /tmp/hydra-up.log | tail -5
          # Reconnect llama-cpp: down removes hydra_default network, so the
          # separate llama-rtx-node compose container loses its connection.
          if podman network exists hydra_default; then
            podman network connect hydra_default llama-cpp 2>/dev/null || true
          fi

      - name: Record deploy log
        run: |
          REV="${{ steps.deploy.outputs.rev }}"
          VERSION="${{ steps.deploy.outputs.version }}"
          echo "[$(date -u +%Y-%m-%dT%H:%M:%SZ)] $VERSION ($REV) deployed via CI by ${{ github.actor }}" >> deploy.log

      - name: Write deploy summary
        if: always()
        run: |
          VERSION="${{ steps.deploy.outputs.version }}"
          REV="${{ steps.deploy.outputs.rev }}"
          TIMESTAMP=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          BUILD_LOG=$(tail -10 /tmp/hydra-build.log 2>/dev/null || echo "(no output)")
          UP_LOG=$(tail -5 /tmp/hydra-up.log 2>/dev/null || echo "(no output)")

          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## Deploy Summary

          | Field   | Value |
          |---------|-------|
          | Version | \`$VERSION\` |
          | Commit  | \`$REV\` |
          | Branch  | \`${{ github.ref_name }}\` |
          | By      | ${{ github.actor }} |
          | Time    | $TIMESTAMP |

          ### Build log
          \`\`\`
          $BUILD_LOG
          \`\`\`

          ### Services
          \`\`\`
          $UP_LOG
          \`\`\`
          SUMMARY

      - name: Verify services healthy
        run: |
          echo "Waiting for services to stabilise..."
          sleep 10
          for i in 1 2 3 4 5; do
            STATUS=$(curl -sf http://localhost:9000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])" 2>/dev/null || echo "unreachable")
            echo "Attempt $i: coordinator status=$STATUS"
            if [ "$STATUS" = "healthy" ] || [ "$STATUS" = "degraded" ]; then
              echo "Services OK"
              exit 0
            fi
            sleep 10
          done
          echo "Coordinator did not come up healthy after deploy"
          exit 1

      - name: Manage build cache (dangling-only; avoid prune -a)
        if: always()
        run: |
          # Only remove dangling images (tagless <none>:<none>).
          # WARNING: podman image prune -a in rootless mode can strip
          # image layers that stopped containers need, causing
          # "transport endpoint is not connected" on overlay mounts.
          podman image prune -f
          podman system df

      - name: Upload deploy log artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: deploy-log-${{ github.run_number }}
          path: deploy.log
          retention-days: 90

  system-mocked:
    name: System Tests (mocked)
    runs-on: self-hosted
    needs: build-test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: Install Python deps
        run: pip install -e ".[dev]" --quiet

      - name: Run mocked system tests
        run: |
          pytest tests/system/test_m1_system.py tests/system/test_m2_system.py -v \
            --junit-xml=TestResults/system-mocked.xml

      - name: Publish system mocked results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: System Mocked Results
          path: TestResults/system-mocked.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload system mocked artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-mocked-results-${{ github.run_number }}
          path: TestResults/system-mocked.xml
          retention-days: 30

  system-full:
    name: System Tests (full stack)
    runs-on: self-hosted
    needs: [build-test, deploy]
    timeout-minutes: 60
    # Runs automatically after a successful deploy on main.
    # Opt-in on other branches: add 'run-e2e' label to PR, '[run-e2e]' in commit msg, or workflow_dispatch.
    if: |
      always() &&
      needs.build-test.result == 'success' &&
      (
        needs.deploy.result == 'success' ||
        contains(github.event.pull_request.labels.*.name, 'run-e2e') ||
        contains(github.event.push.head_commit.message, '[run-e2e]') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.run-system-full == 'true')
      )

    steps:
      - uses: actions/checkout@v4

      - name: Check Python version
        run: python3 --version

      - name: Install Python deps
        run: pip install -e ".[all]" --quiet

      - name: Check services are healthy
        run: |
          echo "Checking Coordinator health..."
          curl -sf http://localhost:9000/health | python3 -m json.tool
          STATUS=$(curl -sf http://localhost:9000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d['status'])")
          if [ "$STATUS" != "healthy" ] && [ "$STATUS" != "degraded" ]; then
            echo "Coordinator not healthy (status=$STATUS). Are all 6 services running?"
            exit 1
          fi
          echo "Services OK (status=$STATUS)"

      - name: Run full-stack system tests
        run: |
          pytest tests/system/ -m system -v --timeout=300 \
            --ignore=tests/system/test_large_prompt_system.py \
            --ignore=tests/system/test_stress_system.py \
            --junit-xml=TestResults/system-full.xml
        env:
          COORD_URL: http://localhost:9000
          RTX_LLAMA_URL: http://localhost:8080
          P100_LLAMA_URL: http://192.168.122.21:8086
          LLAMA_RTX_URL: http://localhost:8080
          LLAMA_P100_URL: http://192.168.122.21:8086
          RTX_AGENT_HOST: "127.0.0.1"
          RTX_AGENT_PORT: "9601"
          P100_AGENT_HOST: "192.168.122.21"
          P100_AGENT_PORT: "9602"
          STORE_HOST: "127.0.0.1"
          STORE_PORT: "9500"

      - name: Publish full-stack system results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: System Full Stack Results
          path: TestResults/system-full.xml
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: Upload full-stack system artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: system-full-results-${{ github.run_number }}
          path: TestResults/system-full.xml
          retention-days: 30

      - name: Create issue on system test full-stack failure
        if: failure()
        run: |
          TITLE="CI: System test full-stack failure on ${{ github.ref_name }}"
          EXISTING=$(gh issue list --search "$TITLE" --state open --json number --jq '.[0].number' 2>/dev/null || true)
          if [ -n "$EXISTING" ]; then
            echo "Open issue #$EXISTING already exists — skipping"
          else
            gh issue create \
              --title "$TITLE" \
              --body "**Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          **Commit:** \`${{ github.sha }}\`
          **Branch:** \`${{ github.ref_name }}\`
          **Actor:** ${{ github.actor }}

          Full-stack system tests failed. Hardware may be involved — check GPU health, KV migration path, and coordinator logs in Grafana." \
              --label "ci-failure,auto-created"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-llama:
    name: Deploy llama-server
    runs-on: self-hosted
    timeout-minutes: 10
    if: |
      startsWith(github.ref, 'refs/tags/llama.cpp') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy-llama == 'true')

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - name: Ensure SSH config for P100
        run: |
          grep -q "Host hydra-p100" ~/.ssh/config 2>/dev/null || cat >> ~/.ssh/config <<'EOF'

          Host hydra-p100
              HostName 192.168.122.21
              User vm1
              IdentityFile ~/.ssh/vm_agent_01
              IdentitiesOnly yes
          EOF

      - name: Restart llama-server RTX
        run: |
          cd infra/llama-rtx-node
          podman-compose pull --quiet 2>/dev/null || true
          podman-compose up -d
          sleep 8
          curl -sf http://localhost:8080/health && echo "llama-rtx OK" || echo "WARNING: llama-rtx health check failed (non-fatal)"

      - name: Deploy llama-server to P100
        run: |
          rsync -az --checksum \
            /mnt/WorkDisk/Workplace/hydra_vortex/src/llama-cpp/build_sm60/bin/llama-server \
            hydra-p100:/opt/software/llama-cpp-hydra-sm60/hydra-sm60/bin/llama-server
          ssh hydra-p100 "systemctl --user restart llama-p100"
          sleep 8
          curl -sf http://192.168.122.21:8086/health && echo "llama-p100 OK" || echo "WARNING: llama-p100 health check failed (non-fatal)"

      - name: Write deploy summary
        if: always()
        run: |
          TAG="${{ github.ref_name }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<SUMMARY
          ## llama-server Deploy

          | Field | Value |
          |-------|-------|
          | Tag   | \`$TAG\` |
          | By    | ${{ github.actor }} |
          | Time  | $(date -u +%Y-%m-%dT%H:%M:%SZ) |

          **RTX**: podman restart llama-cpp
          **P100**: rsync + systemctl restart llama-p100
          SUMMARY
