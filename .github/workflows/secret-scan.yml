name: Secret Scan

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: self-hosted
    timeout-minutes: 5
    # Never run on a fork's pull request — same self-hosted runner protection.
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository

    steps:
      - name: Checkout (full history)
        uses: actions/checkout@v4
        with:
          # Full depth so gitleaks can walk the entire commit history,
          # not just the shallow clone GitHub Actions creates by default.
          fetch-depth: 0

      - name: Install gitleaks
        run: |
          GITLEAKS_VERSION=8.27.2
          FILE="gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz"
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/${FILE}" \
            -o /tmp/gitleaks.tar.gz
          tar -xzf /tmp/gitleaks.tar.gz -C /tmp gitleaks
          sudo mv /tmp/gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan — full history (push)
        if: github.event_name == 'push'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --redact \
            --verbose \
            --exit-code 1

      - name: Scan — PR diff only (pull_request)
        if: github.event_name == 'pull_request'
        run: |
          gitleaks detect \
            --config .gitleaks.toml \
            --source . \
            --redact \
            --verbose \
            --log-opts "origin/${{ github.base_ref }}..HEAD" \
            --exit-code 1
