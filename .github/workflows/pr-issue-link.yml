name: PR — Issue Link Check

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: write

jobs:
  check-closes:
    name: Verify PR links a GitHub issue
    runs-on: ubuntu-latest

    steps:
      - name: Check for closing keyword
        id: check
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if echo "$PR_BODY" | grep -iqE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+'; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Comment if no closing keyword found
        if: steps.check.outputs.found == 'false'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `> [!WARNING]
            > **This PR does not link a GitHub issue.**
            >
            > Add a closing keyword to the PR description so the related issue is auto-closed on merge:
            >
            > \`\`\`
            > Closes #XX
            > Fixes #XX
            > Resolves #XX
            > \`\`\`
            >
            > If this PR genuinely has no related issue, add \`Closes N/A\` (or open one first).
            >
            > _This check re-runs automatically when the PR description is edited._`;

            // Post or update a single bot comment (avoid duplicates)
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('does not link a GitHub issue')
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      - name: Delete warning comment if keyword now present
        if: steps.check.outputs.found == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.includes('does not link a GitHub issue')
            );

            if (existing) {
              await github.rest.issues.deleteComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
              });
            }

      - name: Fail if no closing keyword
        if: steps.check.outputs.found == 'false'
        run: |
          echo "PR body must contain a closing keyword (Closes/Fixes/Resolves #XX)."
          exit 1
