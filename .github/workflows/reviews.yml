name: Reviews — Sync to GitHub Issues

on:
  push:
    paths:
      - "reviews/*.md"
  workflow_dispatch: {}

permissions:
  issues: write
  contents: write

jobs:
  sync-findings:
    name: Create issues for new open findings
    runs-on: self-hosted
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Python deps
        run: pip install -e ".[dev]" --quiet

      - name: Sync findings to GitHub issues
        run: python scripts/sync_reviews_to_github.py
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit issue numbers back to review files
        run: |
          if ! git diff --quiet reviews/; then
            git add reviews/
            git commit -m "chore: add GitHub issue numbers to review findings [skip ci]"
            git push
          else
            echo "No review file changes to commit."
          fi
