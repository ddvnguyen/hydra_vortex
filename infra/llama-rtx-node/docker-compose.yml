services:
  llama-cpp:
    build:
      context: .
      dockerfile: Dockerfile_26.04_cuda13.3
    image: llama-cpp:sm120-cuda13.3
    container_name: llama-cpp
    labels:
      component: llama-server
      node: rtx
    restart: always
    ports:
      - "8080:8080"

    devices:
      - nvidia.com/gpu=all

    security_opt:
      - label=disable

    ipc: host
    cpuset: "4-11"
    mem_reservation: 20g
    mem_limit: 28g
    memswap_limit: 36g
    oom_kill_disable: false

    volumes:
      - ./init:/init:ro
      # - /opt/software/llama-official/stable:/llama:ro
      - /mnt/WorkDisk/Workplace/hydra_vortex/src/llama-cpp/build_sm120:/llama:ro
      - /mnt/SSD:/models:ro
      - /mnt/SSD/qwen3.6_merged_template.jinja:/models/qwen3.6_merged_template.jinja:ro
      - ../models-preset.ini:/models/preset.ini:ro
      - /mnt/SSD/kv_slots:/slots

    working_dir: /llama

    entrypoint: ["/bin/bash", "/init/verify_and_start.sh"]
    environment:
      LLAMA_CHAT_TEMPLATE_KWARGS: '{"preserve_thinking": true}'
    command: >
      llama-server
      -m /models/Qwopus3.6-35B-A3B-v1-APEX-MTP-I-Balanced.gguf
      --chat-template-file /models/qwen3.6_merged_template.jinja
      --slot-save-path /slots/
      --host 0.0.0.0 --port 8080
      --ctx-size 360000
      --temp 0.86 --repeat-penalty 1.06 --top-k 20 --top-p 0.95
      --flash-attn on --cache-type-v q8_0 --cache-type-k q8_0 --kv-unified
      --log-prefix --log-colors on --metrics --slots --perf --props --log-verbosity 4
      --cont-batching --parallel 2 --cache-prompt --cache-reuse 64
      --prio 3 --prio-batch 1
      --n-cpu-moe 32 --n-gpu-layers all
      --context-shift
      --slot-prompt-similarity 0.6
      --reasoning on --jinja
      --rope-scaling yarn
      --rope-scale 12
      --yarn-orig-ctx 32768
      --timeout 1800
      --spec-type draft-mtp --spec-draft-n-max 3
      --rpc-port 9501
#      --mmproj /models/Qwen3.6-35B-A3B-mmproj-F16.gguf
#      --swa-full --direct-io

#   # ── Mix-Precision P/D Split (Router Mode) ──
#   # Uncomment below and comment above to enable dynamic model switching.
#   # Router spawns child processes with per-model args from preset.ini.
#   command: >
#     llama-server
#     --models-dir /models
#     --models-preset /models/preset.ini
#     --models-max 1
#     --host 0.0.0.0 --port 8080
