services:
  llama-cpp:
    build:
      context: .
      dockerfile: Dockerfile_26.04_cuda13.2
    image: llama-cpp:sm120-cuda13.2
    container_name: llama-cpp
    labels:
      component: llama-server
      node: rtx
    restart: always
    ports:
      - "8080:8080"
      - "9503:9503"

    devices:
      - nvidia.com/gpu=all

    security_opt:
      - label=disable

    ipc: host
    cpuset: "4-11"
    mem_reservation: 20g
    mem_limit: 28g
    memswap_limit: 36g
    oom_kill_disable: false

    volumes:
      - ./init:/init:ro
      - /mnt/WorkDisk/Workplace/hydra_vortex/src/llama-cpp/build_sm120:/llama:ro
      - /mnt/SSD:/models:ro

    working_dir: /llama

    entrypoint: ["/bin/bash", "/init/verify_and_start.sh"]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
      LD_LIBRARY_PATH: /llama/bin:/usr/local/cuda-13.2/lib64
      LLAMA_CHAT_TEMPLATE_KWARGS: '{"preserve_thinking": true}'
    # ── Direct model mode (single model, matches P100 for P/D split KV compat) ──
    # Same gguf as P100 (non-MTP APEX) — KV state layer count must match across nodes.
    # Router mode (models-preset) disabled for now.
    # command: >
    #   llama-server
    #   -m /models/Qwopus3.6-35B-A3B-v1-APEX-I-Balanced.gguf
    #   --chat-template-file /models/qwen3.6_merged_template.jinja
    #   --host 0.0.0.0 --port 8080
    #   --ctx-size 360000
    #   --temp 0.86 --repeat-penalty 1.06 --top-k 20 --top-p 0.95
    #   --flash-attn on --cache-type-v q8_0 --cache-type-k q8_0 --kv-unified
    #   --log-prefix --log-colors on --metrics --slots --perf --props --log-verbosity 4
    #   --cont-batching --parallel 2 --cache-prompt --cache-reuse 64
    #   --prio 3 --prio-batch 1
    #   --n-cpu-moe 28 --n-gpu-layers all
    #   --override-tensor token_embd.weight=CPU
    #   --context-shift
    #   --slot-prompt-similarity 0.4
    #   --reasoning on --jinja
    #   --rope-scaling yarn
    #   --rope-scale 12
    #   --yarn-orig-ctx 32768
    #   --timeout 1800
    #   --rpc-port 9503

    # ── Mix-Precision P/D Split (Router Mode) ──
    # Router spawns child processes with per-model args from preset.ini.
    # Coordinator loads/unloads models via /models/load?model=<name>.
    # Per-model args (ctx-size, rope-scaling, reasoning, spec, etc.) are in
    # models-preset.ini — only truly global args belong here.
    command: >
      llama-server
      --models-preset /models/preset.ini
      --models-max 1
      --host 0.0.0.0 --port 8080
      --chat-template-file /models/qwen3.6_merged_template.jinja
      --log-prefix --log-colors on --metrics --slots --perf --props --log-verbosity 4
      --timeout 1800
      --rpc-port 9503
      --ctx-size 360000
      --temp 0.86 --repeat-penalty 1.06 --top-k 20 --top-p 0.95
      --flash-attn on --cache-type-v q8_0 --cache-type-k q8_0 --kv-unified
      --cont-batching --parallel 2 --cache-prompt --cache-reuse 64
      --prio 3 --prio-batch 1
      --n-cpu-moe 18 --n-gpu-layers all
      --override-tensor token_embd.weight=CPU
      --context-shift
      --slot-prompt-similarity 0.4
      --reasoning on --jinja
      --rope-scaling yarn
      --rope-scale 12
      --yarn-orig-ctx 32768
