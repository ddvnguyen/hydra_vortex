; ── Prefill-optimized: aggressive CPU offload, more experts on GPU ──
;[nano]
;model    = /models/Qwopus3.6-35B-A3B-v1-APEX-MTP-I-Nano.gguf
;n-cpu-moe = 0
;alias    = nano

; ── Prefill-optimized: output/embd→CPU, ncmoe=2 → 1187 pp t/s ──
; Compatible with P100 Balanced for P/D split KV migration
[mini]
model    = /models/Qwopus3.6-35B-A3B-v1-APEX-I-Mini.gguf
n-cpu-moe = 8
override-tensor = token_embd\.weight=CPU,output\.weight=CPU,output_norm\.weight=CPU
alias    = mini

; ── Decode-optimized: output stays GPU, ncmoe=26 → 50 tg/s ──
[balanced]
model    = /models/Qwopus3.6-35B-A3B-v1-APEX-I-Balanced.gguf
n-cpu-moe = 30
override-tensor = token_embd\.weight=CPU
alias    = balanced