# Hydra Head - P100 Node Configuration
# Tesla P100 in KVM VM at 192.168.122.21

node:
  name: p100
  mode: vm

binaries:
  llama-server:
    source: ghcr.io/ddvnguyen/llama-server-sm60:f518cff16
    binary: llama-server
    dest: /opt/software/llama-cpp-hydra-sm60/hydra-sm60/bin/llama-server

llama:
  binary: /opt/software/llama-cpp-hydra-sm60/hydra-sm60/bin/llama-server
  working_dir: /opt/software/llama-cpp-hydra-sm60/hydra-sm60/bin
  port: 8086
  rpc_port: 9502
  env:
    # Per-service OTel log push (#363). llama-server on P100
    # is supervised by hydra-head and its stdout is captured
    # by a per-child childWriter (commit 6). The child's OTel
    # resource has service.name=llama-server; the writer
    # pushes OTLP to the OTel Collector on the RTX host.
    OTEL_SERVICE_NAME: llama-server
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_EXPORTER_OTLP_LOGS_ENDPOINT: http://192.168.122.1:4318
  params:
    # Model
    model: /mnt/readonly_data/Qwopus3.6-35B-A3B-v1-APEX-I-Balanced.gguf
    chat-template-file: /mnt/readonly_data/qwen3.6_merged_template.jinja

    # Context and parallelism
    ctx-size: 160000
    parallel: 1

    # GPU layers
    n-gpu-layers: all
    n-cpu-moe: 26

    # Sampling
    temp: 0.86
    repeat-penalty: 1.06
    top-k: 20
    top-p: 0.95

    # Tensor overrides
    override-tensor: "token_embd.weight=CPU"

    # Chat template
    chat-template-kwargs: '{"preserve_thinking": true}'

services:
  # hydra-head manages these as subprocesses (no systemd services
  # for them — the old infra-promtail / node-exporter / nvidia-exporter
  # host services were removed in commit 5f2c231 + this follow-up).
  node_exporter:
    enabled: true
    binary: /home/vm1/.local/bin/node_exporter
    port: 9100
  nvidia_exporter:
    enabled: true
    binary: /home/vm1/.local/bin/nvidia_gpu_exporter
    port: 9835
    args:
      - "--query-field-names=name,driver_version,gpu_uuid,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,clocks.sm,clocks.mem"

# P100 lives in a KVM VM with a slow virtio disk. Model load
# (mmap'ing 16GB of GGUF) takes 235-300s on this hardware, so the
# default max_fails=3 (3 min kill budget) is too aggressive — the
# hydra-head health checker would kill the llama-server 5-60s
# before the model finishes loading. Bump to 30 (≈30 min budget).
# Closes #326.
health:
  max_fails: 30
