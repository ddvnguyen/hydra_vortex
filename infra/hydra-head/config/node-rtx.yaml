# Hydra Head - RTX Node Configuration
# RTX 5060 Ti on host machine
# QUICK-TEST MODE: load mini directly, no router/preset.
# Used for ablation: RTX prefill on Q3_K-mini, decode on P100 (Q5_K-balanced) = cross-quant.
# To revert to router mode: re-add models-preset / models-max, drop the model: line.

node:
  name: rtx
  mode: container

binaries:
  llama-server:
    # Fat binary: sm_86 (3060) + sm_120a (5060 Ti) in one SASS image.
    # The 5060 Ti picks sm_120a; the 3060 picks sm_86. Same OCI image
    # used by node-rtx3060.yaml. Bind-mount from
    # src/llama-cpp/build_sm86_sm120/bin/ in docker-compose.hydra.yml
    # shadows the registry pull, so the source is the OCI fallback
    # only — used by hydra-head if the bind mount isn't present
    # (e.g. on a host that doesn't build the fat binary itself).
    source: ghcr.io/ddvnguyen/llama-server:sm86-sm120-engine
    binary: llama-server
    dest: /llama/bin/llama-server
  node_exporter:
    source: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
    binary: node_exporter
    dest: /opt/hydra/bin/node_exporter
  nvidia_gpu_exporter:
    source: https://github.com/utkuozdemir/nvidia_gpu_exporter/releases/download/v1.2.1/nvidia_gpu_exporter_1.2.1_linux_x86_64.tar.gz
    binary: nvidia_gpu_exporter
    dest: /opt/hydra/bin/nvidia_gpu_exporter

llama:
  # Use llama-engine (not llama-server) for the head — the COMBINED
  # engine mode is implemented in the llama-engine binary only (fork
  # ddvnguyen/llama.cpp hydra-state-streaming branch). llama-engine
  # accepts the same args as llama-server PLUS the hydra flags
  # (--rpc-engine, --combined-ot-pattern, --ggml-rpc-port) that the
  # filter function strips out of argv before common arg parsing
  # (the llama-server binary doesn't have this filter, so it
  # rejects the flags as "invalid argument"). llama-engine is a
  # drop-in replacement for SOLO mode too — same /v1/chat/completions,
  # /slots, /health, /metrics endpoints.
  binary: /llama/bin/llama-engine
  working_dir: /llama
  port: 8080
  rpc_port: 9503
  params:
    # Direct single-model mode (no router, no preset)
    model: /models/Qwopus3.6-35B-A3B-v1-APEX-I-Mini.gguf
    chat-template-file: /models/qwen3.6_merged_template.jinja

    # Per-model tuning for mini (Q3_K, 35B-A3B)
    n-cpu-moe: 8
    n-gpu-layers: all
    override-tensor: "token_embd\\.weight=CPU,output\\.weight=CPU,output_norm\\.weight=CPU"

    # Context and parallelism
    ctx-size: 320000
    parallel: 2

    # Sampling
    temp: 0.86
    repeat-penalty: 1.06
    top-k: 20
    top-p: 0.95

    # Slot management
    slot-prompt-similarity: 0.4

    # ── COMBINED engine-mode wiring (feat/add-rtx-3060-head) ───────────
    # The peer (rtx3060) is configured to expose its ggml RPC backend on
    # :9504. The head is NOT configured to USE that peer here, because
    # the llama.cpp fork at bcfdf7755 / f1801f524 has a runtime crash
    # in `llama_hydra_load_combined_experts` → ggml_backend_rpc_add_server
    # when the head starts with --rpc-engine + --ggml-rpc-port both
    # set (the engine tries to bind the peer's experts but asserts
    # inside libggml-rpc.so at +0x11183). Tracked as a fork-side bug
    # for a follow-up PR in ddvnguyen/llama.cpp. Until that's fixed
    # the head falls back to SOLO mode (Coordinator routes via the
    # legacy P/D split path, NIAH-8000 verified end-to-end). The C#
    # side is ready to drive COMBINED the moment the fork lands the
    # fix (workers.json role/peer/combined_ot_split are set, env vars
    # HYDRA_LLAMA_ENGINE + HYDRA_COORD_COMBINED_ENABLED are enabled,
    # MultiEngineRouter picks a plan when estTokens > 4096 — it just
    # never advertises the capability to the C# side today).
    # ggml-rpc-port: 9505            # re-enable when the fork fix lands
    # rpc-engine: "localhost:9504"
    # combined-ot-pattern: "blk\\.([0-9]+)\\.ffn_.*_exps\\.weight=CPU"

  env:
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: compute,utility
    LD_LIBRARY_PATH: /llama/bin:/usr/local/cuda-13.2/lib64
    LLAMA_CHAT_TEMPLATE_KWARGS: '{"preserve_thinking": true}'

services:
  node_exporter:
    enabled: true
    binary: /opt/hydra/bin/node_exporter
    port: 9100
    args:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
  nvidia_exporter:
    enabled: true
    binary: /opt/hydra/bin/nvidia_gpu_exporter
    port: 9835
    args:
      - "--query-field-names=name,driver_version,gpu_uuid,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,clocks.sm,clocks.mem"
