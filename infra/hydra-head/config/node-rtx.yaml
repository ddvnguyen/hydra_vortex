# Hydra Head - RTX Node Configuration
# RTX 5060 Ti on host machine

node:
  name: rtx
  mode: container

binaries:
  llama-server:
    source: ghcr.io/ddvnguyen/llama-server-sm120:engine
    binary: llama-server
    dest: /llama/bin/llama-server
  # Sidecar exporters — downloaded into the image at build time, managed
  # by hydra-head as child processes (matching the P100 model).
  node_exporter:
    source: https://github.com/prometheus/node_exporter/releases/download/v1.8.2/node_exporter-1.8.2.linux-amd64.tar.gz
    binary: node_exporter
    dest: /opt/hydra/bin/node_exporter
  nvidia_gpu_exporter:
    source: https://github.com/utkuozdemir/nvidia_gpu_exporter/releases/download/v1.2.1/nvidia_gpu_exporter_1.2.1_linux_x86_64.tar.gz
    binary: nvidia_gpu_exporter
    dest: /opt/hydra/bin/nvidia_gpu_exporter
  promtail:
    source: https://github.com/grafana/loki/releases/download/v3.4.3/promtail-linux-amd64.zip
    binary: promtail-linux-amd64
    dest: /opt/hydra/bin/promtail

llama:
  binary: /llama/bin/llama-server
  working_dir: /llama
  port: 8080
  rpc_port: 9503
  params:
    # Direct model load (required for engine RPC mode — router mode does not
    # expose slots to the RPC process, causing EnginePrefill/Decode to fail
    # with "invalid slot ID").
    model: /models/Qwopus3.6-35B-A3B-v1-APEX-I-Balanced.gguf
    alias: balanced
    n-cpu-moe: 30
    override-tensor: 'token_embd\.weight=CPU'
    chat-template-file: /models/qwen3.6_merged_template.jinja

    # Chat template kwargs — enables Qwen3 thinking mode
    chat-template-kwargs: '{"preserve_thinking": true}'

    # Reasoning — required for Qwen3 thinking mode (outputs reasoning_content)
    reasoning: on

    # Context and parallelism
    ctx-size: 320000
    parallel: 2

    # GPU layers
    n-gpu-layers: all

    # Sampling
    temp: 0.86
    repeat-penalty: 1.06
    top-k: 20
    top-p: 0.95

    # Slot management
    slot-prompt-similarity: 0.4

  env:
    NVIDIA_VISIBLE_DEVICES: all
    NVIDIA_DRIVER_CAPABILITIES: compute,utility
    LD_LIBRARY_PATH: /llama/bin:/usr/local/cuda-13.2/lib64

# Sidecar services — hydra-head manages these as child processes. The
# host Quadlets (infra-node-exporter / infra-nvidia-exporter / infra-promtail)
# are stopped and disabled by deploy-hydra-head.sh so these bind the same
# ports (9100 / 9835 / 9080) on the host network namespace.
services:
  promtail:
    enabled: true
    binary: /opt/hydra/bin/promtail
    config: /opt/hydra/config/promtail-rtx.yml
  node_exporter:
    enabled: true
    binary: /opt/hydra/bin/node_exporter
    port: 9100
    args:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--path.rootfs=/rootfs"
  nvidia_exporter:
    enabled: true
    binary: /opt/hydra/bin/nvidia_gpu_exporter
    port: 9835
    args:
      - "--query-field-names=name,driver_version,gpu_uuid,memory.total,memory.used,memory.free,utilization.gpu,utilization.memory,temperature.gpu,power.draw,clocks.sm,clocks.mem"
