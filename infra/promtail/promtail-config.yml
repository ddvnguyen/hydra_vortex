# Containerized promtail config (used by docker-compose.infra.yml).
# Scrapes all container logs via podman Docker API + applies
# component/node labels from container name in pipeline stages.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_component]
        target_label: component
        action: replace

      - target_label: job
        replacement: docker-containers

      - source_labels: [__meta_docker_container_label_node]
        target_label: node
        action: replace

      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        action: replace

      - source_labels: [component]
        regex: observability
        action: drop

    pipeline_stages:
      - cri: {}

      - match:
          selector: '{container=~"hydra-head-rtx"}'
          stages:
            - replace:
                expression: '\x1b\[[0-9;]*[a-zA-Z]'
                replace: ''
            - regex:
                expression: '^(?P<llama_ts>\d+\.\d+\.\d+\.\d+)\s+(?P<llama_level>[A-Z])\s+'
            - template:
                source: "component"
                template: "{{ if .llama_ts }}llama-server{{ else }}hydra-head{{ end }}"
            - labels:
                component:
            - template:
                source: "node"
                template: "rtx"
            - labels:
                node:

      - match:
          selector: '{container=~"hydra-core"}'
          stages:
            - template:
                source: "component"
                template: "hydra"
            - labels:
                component:

      - match:
          selector: '{container=~"hydra[-_]store[-_]?1?"}'
          stages:
            - template:
                source: "component"
                template: "store"
            - labels:
                component:
