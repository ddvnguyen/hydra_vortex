# Containerized promtail config (used by hydra docker-compose).
# Scrapes container logs via the Podman Docker API and CRI-log files.
# For the host-based variant (systemd --user), see promtail-host.yml.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: container-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: containerlogs
          __path__: /tmp/container-logs/*.log
    pipeline_stages:
      - regex:
          source: "filename"
          expression: "/tmp/container-logs/(?P<container>.+)\\.log"
      - labels:
          container:

      - match:
          selector: '{container="llama-cpp"}'
          stages:
            - template:
                source: "component"
                template: "llama-server"
            - labels:
                component:

      - match:
          selector: '{container=~"hydra_.*"}'
          stages:
            - regex:
                source: "container"
                expression: "hydra_(?P<component>[^-_]+).*"
            - labels:
                component:

      - match:
          selector: '{container=~"hydra_agent-rtx_1|llama-cpp"}'
          stages:
            - template:
                source: "node"
                template: "rtx"
            - labels:
                node:

      - match:
          selector: '{container="hydra_agent-p100_1"}'
          stages:
            - template:
                source: "node"
                template: "p100"
            - labels:
                node:

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_component]
        target_label: component
        action: replace

      - target_label: job
        replacement: docker-containers

      - source_labels: [__meta_docker_container_label_node]
        target_label: node
        action: replace

      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        action: replace

      - source_labels: [component]
        regex: observability
        action: drop

    pipeline_stages:
      - cri: {}
