# Host-based promtail config.
# NOT used in a container — runs directly on the host as a systemd --user service.
# Scrapes log files written by container-log-shipper.service (which tails podman logs -f).
# Installed at ~/.local/bin/promtail; config at ~/.config/promtail/promtail-config.yml.
#
# Why host-based: podman 5.7.0's Docker-compatible API has a NULL-JSON bug that
# breaks promtail's docker_sd_configs, and rootless containers cannot read systemd
# journal files (mode 600, root-owned).
#
# Installation: see container-log-shipper.service and promtail.service under
# ~/.config/systemd/user/ on the host.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /home/ddv/.local/share/promtail/positions.yaml

clients:
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: container-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: containerlogs
          __path__: /tmp/container-logs/*.log
    pipeline_stages:
      - regex:
          source: "filename"
          expression: "/tmp/container-logs/(?P<container>.+)\\.log"
      - labels:
          container:

      - match:
          selector: '{container="llama-cpp"}'
          stages:
            - template:
                source: "component"
                template: "llama-server"
            - labels:
                component:

      - match:
          selector: '{container=~"hydra_.*"}'
          stages:
            - regex:
                source: "container"
                expression: "hydra_(?P<component>[^-_]+).*"
            - labels:
                component:

      - match:
          selector: '{container=~"hydra_agent-rtx_1|llama-cpp"}'
          stages:
            - template:
                source: "node"
                template: "rtx"
            - labels:
                node:

      - match:
          selector: '{container="hydra_agent-p100_1"}'
          stages:
            - template:
                source: "node"
                template: "p100"
            - labels:
                node:

  - job_name: docker-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_component]
        target_label: component
        action: replace

      - target_label: job
        replacement: docker-containers

      - source_labels: [__meta_docker_container_label_node]
        target_label: node
        action: replace

      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        action: replace

      - source_labels: [component]
        regex: observability
        action: drop

    pipeline_stages:
      - cri: {}
