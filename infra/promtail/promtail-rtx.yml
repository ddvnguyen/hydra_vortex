# Promtail config for in-container use (managed by hydra-head on RTX).
# Mirrors infra/promtail/promtail-config.yml so all host container logs
# continue to be shipped to Loki after the infra-promtail Quadlet is
# removed. Same podman Docker SD + component/node label pipeline.

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  # Writable directory inside the container (mounted from the host
  # via deploy-hydra-head.sh so positions survive container restarts).
  filename: /opt/hydra/promtail-positions/positions.yaml

clients:
  # host.docker.internal resolves to the host loopback since the
  # hydra-head-rtx container runs with --network host.
  - url: http://localhost:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker-containers
    docker_sd_configs:
      # Mounted in via socat proxy (host podman.sock is 0660, the
      # in-container hydra user can't read it directly).
      - host: unix:///var/run/socks/docker.sock
        refresh_interval: 5s
    relabel_configs:
      - source_labels: [__meta_docker_container_label_component]
        target_label: component
        action: replace

      - target_label: job
        replacement: docker-containers

      - source_labels: [__meta_docker_container_label_node]
        target_label: node
        action: replace

      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
        action: replace

      - source_labels: [component]
        regex: observability
        action: drop

    pipeline_stages:
      - cri: {}

      - match:
          # New container name pattern (compose pod + multi-container
          # service). Both `hydra-system_head-rtx_1` (compose) and the
          # old `hydra-head-rtx` (legacy Quadlet) are accepted so this
          # config is robust to either deployment.
          selector: '{container=~"hydra-system_head-rtx_1|hydra-head-rtx"}'
          stages:
            - replace:
                expression: '\x1b\[[0-9;]*[a-zA-Z]'
                replace: ''
            - regex:
                # llama-server emits lines like:
                #   29.31.578.695 I srv  log_server_r: done request: ...
                #   1782100000.123 main info: model loaded
                # The first form has `IP-like 4-octet + level letter`
                # and only llama-server produces it; hydra-head agent
                # output never has that exact prefix.
                expression: '^(?P<llama_ts>\d+\.\d+\.\d+\.\d+)\s+(?P<llama_level>[A-Z])\s+'
            - template:
                source: "component"
                template: "{{ if .llama_ts }}llama-server{{ else }}hydra-head{{ end }}"
            - labels:
                component:
            - template:
                source: "node"
                template: "rtx"
            - labels:
                node:

      - match:
          # New container name pattern (compose pod). Also accepts the
          # legacy `hydra-core` Quadlet name for backwards compat.
          selector: '{container=~"hydra-system_core_1|hydra-core"}'
          stages:
            - template:
                source: "component"
                template: "hydra"
            - labels:
                component:
            # The core container is in the same RTX compose pod as
            # head-rtx, so its `node` label is also "rtx". Set it
            # explicitly here so the Loki stream can be filtered by
            # `{component="hydra", node="rtx"}` (otherwise only the
            # base docker_sd relabel fires and `node` is missing for
            # containers without the docker label).
            - template:
                source: "node"
                template: "rtx"
            - labels:
                node:

      - match:
          selector: '{container=~"hydra[-_]store[-_]?1?"}'
          stages:
            - template:
                source: "component"
                template: "store"
            - labels:
                component:
