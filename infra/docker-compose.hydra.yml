name: hydra-system

# Hydra Core + Hydra Head (RTX) — single source of truth for the
# "hydra system" stack on the RTX host. P100 is a separate VM and is
# NOT in this compose.
#
# Both services run as uid 1000 (the host ddv user) so the in-container
# promtail (managed by hydra-head) can read /mnt/containers/*/ctr.log
# directly without socat. This also matches the host auth.json owner
# (ddv:ddv) so ghcr.io pulls work without chmod 644.
#
# Deploy with:
#   podman compose -f infra/docker-compose.hydra.yml up -d
#   (note: podman-compose is not used; podman 5.x has native compose support)

# ── Named volumes ─────────────────────────────────────────────────────────
volumes:
  hydra-head-promtail-positions:

services:
  # ── Hydra Core: C# coordinator + Store + chunked manifest ─────────────
  core:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: core
      tags:
        - localhost/hydra-core:latest
    image: localhost/hydra-core:latest
    network_mode: host
    user: "1000:1000"
    # CRITICAL: disable userns remapping. With the default userns,
    # container uid 1000 maps to host uid 100999, which means
    # uid=1000(ubuntu) inside can't read host files owned by ddv
    # (uid 1000) — including /mnt/containers/ctr.log (700) and
    # /mnt/containers/volumes/* (700). host userns makes container
    # uids match host uids directly. See #325 follow-up.
    userns_mode: "host"
    tmpfs:
      - /mnt/llm-ram:size=30G
    volumes:
      - ./hydra-core/config:/etc/hydra/config:ro
      - /mnt/SSD/hydra-backup:/mnt/SSD/hydra-backup:rw
      - /run/user/1000/containers/auth.json:/run/host-ctrs-auth.json:ro
    environment:
      - HYDRA_STORE_HOST=0.0.0.0
      - HYDRA_STORE_PORT=9500
      - HYDRA_STORE_DIR=/mnt/llm-ram/store
      - HYDRA_STORE_DEBUG_PORT=9501
      - HYDRA_STORE_PG_CONN=Host=localhost;Database=hydra_store;Username=hydra;Password=hydra
      - HYDRA_STORE_BACKUP_DIR=/mnt/SSD/hydra-backup
      - HYDRA_STORE_RESTORE_TOP_N=10
      - HYDRA_COORD_PORT=9000
      - HYDRA_COORD_MIX_PRECISION_ENABLED=true
      - HYDRA_COORD_ALLOW_CROSS_MODEL_KV_REUSE=true
      - HYDRA_COORD_ATOMIC_THRESHOLD=2048
      - HYDRA_COORD_WARM_THRESHOLD=5120
      - HYDRA_COORD_CONFIG_FILE=/etc/hydra/config/workers.json
      - HYDRA_COORD_ENABLE_CHUNKS=true
      - HYDRA_STORE_CHUNK_SIZE=8192
      - HYDRA_LOG_LOKI_URL=http://localhost:3100
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9501"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      component: hydra
    restart: always

  # ── Hydra Head (RTX): Go node agent + llama-server + 3 sidecars ─────
  # Manages: llama-server (Mini / Balanced from /llama/bin via OCI),
  # node_exporter, nvidia_gpu_exporter, promtail. All in one container.
  #
  # Image is built separately by `bash scripts/deploy-hydra-head.sh rtx`
  # (not by this compose — the Dockerfile is infra/hydra-head/Dockerfile.rtx,
  # not infra/Dockerfile).
  head-rtx:
    image: localhost/hydra-head:rtx
    network_mode: host
    user: "1000:1000"
    # See core service above — same userns fix applies here so the
    # in-container promtail can read /mnt/containers/*/ctr.log.
    userns_mode: "host"
    devices:
      - nvidia.com/gpu=all
    depends_on:
      - core
    volumes:
      # Model + KV slot data
      - /mnt/SSD:/models:ro
      - hydra-head-promtail-positions:/opt/hydra/promtail-positions:rw
      # Configs (RTX-specific)
      - ./hydra-head/config:/opt/hydra/config:ro
      # Pre-built llama-server binary (mounted from build dir so the OCI
      # image doesn't need to re-pull on every start)
      - ../src/llama-cpp/build_sm120/bin/:/llama/bin/:ro
      # ghcr.io creds for in-container pulls
      - /run/user/1000/containers/auth.json:/run/host-ctrs-auth.json:ro
      # Host filesystem for node_exporter + promtail to read ctr.log
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
      # Podman socket for promtail's docker_sd_configs to find all
      # host containers. The socket is owned by host uid 1000 (ddv),
      # so the container MUST run as uid 1000 to read it. With
      # --user 1000:1000 this works without socat or symlinks.
      - /run/user/1000/podman:/var/run/socks:rw
      # Source: same path mounted by 'core' so the backup dir is real
      - /mnt/containers/:/mnt/containers/:ro
    environment:
      # Auth token: generated by scripts/deploy-hydra-head.sh, stored
      # in $REPO_ROOT/.hydra-head-token. The deploy script reads it
      # and passes it via the shell. For compose: set
      # HYDRA_HEAD_AUTH_TOKEN in your shell before running
      # `podman compose ... up -d`, e.g.:
      #   export HYDRA_HEAD_AUTH_TOKEN=$(cat .hydra-head-token)
      - HYDRA_HEAD_AUTH_TOKEN=${HYDRA_HEAD_AUTH_TOKEN:?must export HYDRA_HEAD_AUTH_TOKEN}
      - REGISTRY_AUTH_FILE=/run/host-ctrs-auth.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9700/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: hydra-head
      node: rtx
    restart: always
