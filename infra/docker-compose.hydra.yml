name: hydra-core

services:
  core:
    build:
      context: ..
      dockerfile: infra/Dockerfile
      target: core
      tags:
        - localhost/hydra-core:latest
    network_mode: host
    tmpfs:
      - /mnt/llm-ram:size=30G
    environment:
      - HYDRA_STORE_HOST=0.0.0.0
      - HYDRA_STORE_PORT=9500
      - HYDRA_STORE_DIR=/mnt/llm-ram/store
      - HYDRA_STORE_DEBUG_PORT=9501
      - HYDRA_STORE_PG_CONN=Host=localhost;Database=hydra_store;Username=hydra;Password=hydra
      - HYDRA_STORE_BACKUP_DIR=/mnt/SSD/hydra-backup
      - HYDRA_STORE_RESTORE_TOP_N=10
      - HYDRA_COORD_PORT=9000
      - HYDRA_COORD_MIX_PRECISION_ENABLED=true
      - HYDRA_COORD_ATOMIC_THRESHOLD=2048
      - HYDRA_COORD_WARM_THRESHOLD=5120
      - 'HYDRA_COORD_WORKERS=[{"name":"rtx","host":"localhost","rpc_port":9601,"llama_rpc_port":9503,"llama_url":"http://localhost:8080","worker_type":3,"slots":2,"prefill_priority":1,"decode_priority":2,"decode_speed_tps":200},{"name":"p100","host":"localhost","rpc_port":9602,"llama_rpc_port":9502,"llama_url":"http://192.168.122.21:8086","worker_type":2,"slots":1,"prefill_priority":2,"decode_priority":1,"decode_speed_tps":28}]'
    healthcheck:
      test: ["CMD", "/bin/bash", "-c", "exec 3<>/dev/tcp/localhost/9501"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      component: hydra
    restart: unless-stopped
