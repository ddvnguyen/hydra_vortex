auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 32
  ingestion_burst_size_mb: 64
  max_line_size: 1048576   # 1 MiB; was default 256 KiB; #324 dropped prefill lines
  max_cache_freshness_per_query: 10m

  # OTLP receiver label promotion. By default, Loki's OTLP
  # receiver only auto-promotes a fixed allowlist of resource
  # attributes to stream labels (service.name, service.namespace,
  # deployment.environment(.name), service.instance.id, cloud.*,
  # k8s.*, container.name). The OTel Collector gateway sets
  # `component` and `node` as resource attributes via the
  # transform/log_labels processor — without this explicit
  # block, those land in structured metadata, not stream labels,
  # and LogQL selectors like {component="hydra"} match nothing.
  # See the second-pass PR #369 review for context.
  otlp_config:
    resource_attributes:
      attributes_config:
        - action: index_label
          attributes: [component, node]

  # `level` is set at *log* scope (from severity_text), not
  # resource scope. Loki's `discover_log_levels: true` (the
  # default) auto-creates a `detected_level` stream label from
  # the log line; we don't need to promote our `level` attribute
  # separately.
