global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - alerts.yml

scrape_configs:
  - job_name: hydra-core-debug
    static_configs:
      - targets: ["localhost:9501"]
        labels:
          component: hydra-core

  - job_name: hydra-core-api
    static_configs:
      - targets: ["localhost:9000"]
        labels:
          component: hydra-core

  - job_name: hydra-llama-rtx
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:8080"]
        labels:
          component: llama-server
          node: rtx

  - job_name: hydra-llama-p100
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.122.21:8086"]
        labels:
          component: llama-server
          node: p100

  # hydra-head exposes /status + /health as JSON, not Prometheus metrics.
  # Monitor llama-server health via Hydra.Core's hydra_agent_llama_healthy metric instead.

  - job_name: hydra-node
    static_configs:
      - targets: ["localhost:9100"]
        labels:
          component: node

  - job_name: hydra-gpu
    metrics_path: /metrics
    static_configs:
      - targets: ["localhost:9835"]
        labels:
          component: gpu
          node: rtx

  - job_name: hydra-node-p100
    static_configs:
      - targets: ["192.168.122.21:9100"]
        labels:
          component: node
          node: p100

  - job_name: hydra-gpu-p100
    metrics_path: /metrics
    static_configs:
      - targets: ["192.168.122.21:9835"]
        labels:
          component: gpu
          node: p100
