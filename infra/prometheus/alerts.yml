groups:
  - name: hydra
    interval: 30s
    rules:
      - alert: HydraCoreDown
        expr: up{component="hydra-core"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Hydra.Core is down"
          description: "Hydra.Core has been unreachable for 30s"

      # hydra-head health is monitored indirectly via Hydra.Core's
      # hydra_agent_llama_healthy and llama-server health checks.

      - alert: HighRequestLatency
        expr: histogram_quantile(0.95, rate(hydra_request_latency_seconds_bucket[5m])) > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High request latency on {{ $labels.node }}"
          description: "p95 latency on {{ $labels.node }} is {{ $value }}s (threshold 30s)"

      - alert: NoSlotUtilization
        expr: hydra_agent_slots_idle == 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No idle slots on {{ $labels.node }}"
          description: "All slots on {{ $labels.node }} are busy for 5+ minutes"

      - alert: MigrationFailing
        expr: rate(hydra_migrations_total[5m]) == 0 and delta(hydra_migrations_total[10m]) < 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No migrations detected"
          description: "No cache migration activity in the last 10 minutes"

      - alert: StoreOpErrors
        expr: rate(hydra_store_ops_total{op=~".*error.*|.*fail.*"}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Store operation errors"
          description: "Store is seeing {{ $value }} errors/s (op={{ $labels.op }})"

      - alert: LlamaServerDown
        expr: up{component="llama-server"} == 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "llama-server {{ $labels.node }} is down"
          description: "llama-server at {{ $labels.instance }} has been unreachable for 30s"

      - alert: GPUMemoryPressure
        expr: (DCGM_FI_DEV_FB_FREE{job="hydra-gpu"} / (DCGM_FI_DEV_FB_USED{job="hydra-gpu"} + DCGM_FI_DEV_FB_FREE{job="hydra-gpu"}) < 0.1) or (nvidia_smi_memory_free_bytes{job="hydra-gpu-p100"} / nvidia_smi_memory_total_bytes{job="hydra-gpu-p100"} < 0.1)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.node }} memory pressure"
          description: "GPU {{ $labels.node }} has < 10% free memory ({{ $value | humanizePercentage }} free)"

      - alert: HighGPUTemperature
        expr: DCGM_FI_DEV_GPU_TEMP{job="hydra-gpu"} > 85 or nvidia_smi_temperature_gpu{job="hydra-gpu-p100"} > 85
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "GPU {{ $labels.node }} temperature high"
          description: "GPU {{ $labels.node }} is at {{ $value }}°C (threshold 85°C)"

      - alert: TrackerLeak
        expr: hydra_worker_busy_seconds > 600
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Tracker leak on {{ $labels.node }}"
          description: "Worker {{ $labels.node }} has been busy for {{ $value }}s — likely a tracker never released"
