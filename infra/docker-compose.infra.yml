name: hydra-infra

# The infra-host pod — Loki, Prometheus, Grafana, Postgres, the
# Grafana image renderer, Open WebUI, pgAdmin, and the OTel Collector
# gateway. The 3 exporters (node-exporter / nvidia_gpu_exporter /
# promtail) used to live here as host-side systemd services; they were
# removed in commit 5f2c231 — the in-container hydra-head now manages
# them as subprocesses. The host promtail-prometheus image
# (`grafana/promtail:3.4`) is no longer used either.
#
# The OTel Collector was previously deployed as a Quadlet in
# infra-host.pod, which died during the 2026-06-30 21:03 unclean
# shutdown (conmon died, resolv.conf lost). It was moved into this
# compose file (2026-07-01) so it's co-located with Loki and managed
# by the same pod lifecycle.

services:

  loki:
    image: grafana/loki:3.4
    user: "0"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    command: -config.file=/etc/loki/loki-config.yml
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3100/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: observability
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.listen-address=0.0.0.0:9091
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9091/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      component: observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6
    network_mode: host
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards/dashboard-providers.yml:/etc/grafana/provisioning/dashboards/dashboard-providers.yml:ro
      - ./grafana/dashboards/hydra-dashboard.json:/var/lib/grafana/dashboards/hydra-dashboard.json:ro
      - ./grafana/dashboards/hydra-logs.json:/var/lib/grafana/dashboards/hydra-logs.json:ro
      - ./grafana/dashboards/hydra-coordinator.json:/var/lib/grafana/dashboards/hydra-coordinator.json:ro
      - ./grafana/dashboards/hydra-timeline-bars.json:/var/lib/grafana/dashboards/hydra-timeline-bars.json:ro
      - ./grafana/dashboards/hydra-request-detail.json:/var/lib/grafana/dashboards/hydra-request-detail.json:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/hydra-dashboard.json
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=marcusolsson-dynamictext-panel
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=marcusolsson-dynamictext-panel
      - GF_RENDERING_SERVER_URL=http://localhost:8081/render
      - GF_RENDERING_CALLBACK_URL=http://localhost:3000/
    depends_on:
      - prometheus
      - loki
      - renderer
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: observability
    restart: unless-stopped

  postgres:
    image: postgres:16
    network_mode: host
    environment:
      - POSTGRES_DB=hydra_store
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=hydra
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra_store"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      component: store
    restart: unless-stopped

  renderer:
    image: grafana/grafana-image-renders:latest
    network_mode: host
    environment:
      - HTTP_PORT=8081
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8081"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      component: observability
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    network_mode: host
    environment:
      - PORT=3001
      - OPENAI_API_BASE_URL=http://localhost:9000/v1
    volumes:
      - openwebui-data:/app/backend/data
    labels:
      component: frontend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    network_mode: host
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@hydra.example
      - PGADMIN_DEFAULT_PASSWORD=hydra
      - PGADMIN_LISTEN_PORT=8888
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/misc/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: observability
    restart: unless-stopped

  # ── OTel Collector gateway (PR #369) ────────────────────────────────────
  # Receives OTLP/HTTP on :4318 from all Hydra services (C# Hydra.Core,
  # Go hydra-head + child llama-engine / node_exporter / nvidia_exporter).
  # Transforms OTel resource attributes to Loki stream labels via the
  # `transform/log_labels` processor, batches, and forwards to Loki's
  # native OTLP endpoint at /otlp/v1/logs.
  #
  # P100 services reach this collector at http://192.168.122.1:4318
  # (the RTX host as seen from the KVM VM — the override lives in
  # infra/hydra-head/config/node-p100.yaml).
  #
  # Image pinned to otel/opentelemetry-collector-contrib:0.110.0 because:
  #   - 0.110.0 retains `service.telemetry.metrics.address` (removed in 0.111+)
  #   - 0.110.0 still bundles the contrib receivers/processors we use
  #   - Avoids the "non-reproducible :latest" footgun
  # The contrib image is `FROM scratch` (no shell, no wget/curl), so a
  # container-level health check is impossible. The health probe is done
  # from the host side (see scripts/deploy-hydra-head.sh :13133 probe).
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.110.0
    network_mode: host
    volumes:
      - ./otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    command: --config=/etc/otelcol/config.yaml
    labels:
      component: observability
    restart: unless-stopped

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  pgadmin-data:
  pg-data:
  openwebui-data:
