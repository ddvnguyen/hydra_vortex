#       - loki
#     labels:
#       component: observability
#     restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    network_mode: host
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.listen-address=0.0.0.0:9091
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:9091/-/ready"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    labels:
      component: observability
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6
    network_mode: host
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards/dashboard-providers.yml:/etc/grafana/provisioning/dashboards/dashboard-providers.yml:ro
      - ./grafana/dashboards/hydra-dashboard.json:/var/lib/grafana/dashboards/hydra-dashboard.json:ro
      - ./grafana/dashboards/hydra-logs.json:/var/lib/grafana/dashboards/hydra-logs.json:ro
      - ./grafana/dashboards/hydra-coordinator.json:/var/lib/grafana/dashboards/hydra-coordinator.json:ro
      - ./grafana/dashboards/hydra-timeline-bars.json:/var/lib/grafana/dashboards/hydra-timeline-bars.json:ro
      - ./grafana/dashboards/hydra-request-detail.json:/var/lib/grafana/dashboards/hydra-request-detail.json:ro
      - grafana-data:/var/lib/grafana
    environment:
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/hydra-dashboard.json
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_INSTALL_PLUGINS=marcusolsson-dynamictext-panel
      - GF_PLUGINS_ALLOW_LOADING_UNSIGNED_PLUGINS=marcusolsson-dynamictext-panel
      - GF_RENDERING_SERVER_URL=http://localhost:8081/render
      - GF_RENDERING_CALLBACK_URL=http://localhost:3000/
    depends_on:
      - prometheus
      - loki
      - renderer
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: observability
    restart: unless-stopped

  postgres:
    image: postgres:16
    network_mode: host
    environment:
      - POSTGRES_DB=hydra_store
      - POSTGRES_USER=hydra
      - POSTGRES_PASSWORD=hydra
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hydra -d hydra_store"]
      interval: 5s
      timeout: 3s
      retries: 5
    labels:
      component: store
    restart: unless-stopped

  renderer:
    image: grafana/grafana-image-renderer:latest
    network_mode: host
    environment:
      - HTTP_PORT=8081
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8081"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 25s
    labels:
      component: observability
    restart: unless-stopped

  openwebui:
    image: ghcr.io/open-webui/open-webui:main
    network_mode: host
    environment:
      - PORT=3001
      - OPENAI_API_BASE_URL=http://localhost:9000/v1
    volumes:
      - openwebui-data:/app/backend/data
    labels:
      component: frontend
    restart: unless-stopped

  pgadmin:
    image: dpage/pgadmin4:latest
    network_mode: host
    volumes:
      - ./pgadmin/servers.json:/pgadmin4/servers.json:ro
      - pgadmin-data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@hydra.example
      - PGADMIN_DEFAULT_PASSWORD=hydra
      - PGADMIN_LISTEN_PORT=8888
      - PGADMIN_SERVER_JSON_FILE=/pgadmin4/servers.json
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:8888/misc/ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    labels:
      component: observability
    restart: unless-stopped

volumes:
  loki-data:
  prometheus-data:
  grafana-data:
  promtail-positions:
  pgadmin-data:
  pg-data:
  openwebui-data:
